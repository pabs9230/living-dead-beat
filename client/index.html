<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Living Dead Beat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0000;
      color: #e0c0c0;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Login Screen — Red Room / Bloody */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      background: radial-gradient(ellipse at center, #1a0000 0%, #0d0000 70%);
      padding: 50px 60px;
      border: 2px solid #6b0000;
      border-radius: 4px;
      box-shadow: 0 0 60px rgba(180,0,0,0.35), inset 0 0 80px rgba(0,0,0,0.7);
    }
    #login-screen h1 {
      font-family: 'Creepster', 'Impact', cursive;
      font-size: 3.5rem;
      color: #cc0000;
      text-shadow:
        0 0 8px #ff0000,
        2px 5px 0px #5a0000,
        0 0 30px rgba(220,0,0,0.4);
      letter-spacing: 6px;
    }
    #login-screen p {
      color: #8b3333;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    #nickname-input {
      background: #1a0000;
      border: 2px solid #7a0000;
      color: #ffcccc;
      padding: 12px 20px;
      font-size: 1.1rem;
      border-radius: 4px;
      outline: none;
      width: 280px;
      text-align: center;
    }
    #nickname-input::placeholder { color: #6b2222; }
    #nickname-input:focus { border-color: #cc0000; box-shadow: 0 0 10px rgba(200,0,0,0.4); }
    #join-btn {
      background: #8b0000;
      color: #ffcccc;
      border: 1px solid #cc0000;
      padding: 12px 40px;
      font-family: 'Creepster', cursive;
      font-size: 1.2rem;
      letter-spacing: 2px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #join-btn:hover { background: #aa0000; box-shadow: 0 0 15px rgba(200,0,0,0.6); }
    #join-btn:disabled { background: #4a0000; cursor: not-allowed; }
    #error-msg { color: #ff6666; font-size: 0.9rem; min-height: 1.2em; }

    /* Game Screen */
    #game-screen {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #game-canvas {
      display: block;
      background: #111008;
    }

    /* Chat Window */
    #chat-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 300px;
      background: rgba(10, 0, 0, 0.85);
      border: 1px solid #6b0000;
      border-radius: 4px;
      overflow: hidden;
    }
    #chat-messages {
      height: 150px;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .chat-msg {
      font-size: 0.8rem;
      line-height: 1.3;
    }
    .chat-msg .sender { color: #ff6666; font-weight: bold; }
    .chat-msg .text { color: #d1a0a0; }
    #chat-input-row {
      display: flex;
      border-top: 1px solid #6b0000;
    }
    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #ffcccc;
      padding: 8px;
      font-size: 0.85rem;
      outline: none;
    }
    #chat-send {
      background: #7a0000;
      border: none;
      color: #ffcccc;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #chat-send:hover { background: #aa0000; }

    /* Player count */
    #hud {
      position: absolute;
      top: 15px;
      right: 20px;
      background: rgba(10, 0, 0, 0.75);
      border: 1px solid #6b0000;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 0.85rem;
      color: #ff6666;
    }

    /* Controls hint */
    #controls-hint {
      position: absolute;
      top: 15px;
      left: 20px;
      background: rgba(10, 0, 0, 0.75);
      border: 1px solid #6b0000;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 0.78rem;
      color: #8b3333;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="login-screen">
    <h1>LIVING DEAD BEAT</h1>
    <p>Enter a nickname to join the game</p>
    <input id="nickname-input" type="text" placeholder="Your nickname..." maxlength="20" autocomplete="off" />
    <button id="join-btn">Enter the Night</button>
    <div id="error-msg"></div>
  </div>

  <div id="game-screen">
    <canvas id="game-canvas"></canvas>
    <div id="hud">Players: <span id="player-count">0</span>/10</div>
    <div id="controls-hint">
      WASD / Arrow Keys — Move<br>
      Left Click — Dodge<br>
      Right Click — Attack
    </div>
    <div id="chat-container">
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Say something..." maxlength="200" autocomplete="off" />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
