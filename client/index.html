<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Living Dead Beat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1207;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Login Screen */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    #login-screen h1 {
      font-size: 3rem;
      color: #ff6eb4;
      text-shadow: 0 0 18px #cc0060, 0 0 40px #660030;
      letter-spacing: 5px;
    }
    #login-screen p {
      color: #7fff7a;
      font-size: 0.9rem;
      text-shadow: 0 0 8px #1aaa15;
    }
    #nickname-input {
      background: #0a140a;
      border: 2px solid #cc0060;
      color: #ece8d0;
      padding: 12px 20px;
      font-size: 1.1rem;
      font-family: 'Courier New', monospace;
      border-radius: 4px;
      outline: none;
      width: 280px;
      text-align: center;
    }
    #nickname-input:focus { border-color: #ff6eb4; box-shadow: 0 0 8px #cc006080; }
    #join-btn {
      background: #cc0060;
      color: #ece8d0;
      border: none;
      padding: 12px 40px;
      font-size: 1rem;
      font-family: 'Courier New', monospace;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    #join-btn:hover { background: #ff2277; box-shadow: 0 0 12px #ff227780; }
    #join-btn:disabled { background: #660030; cursor: not-allowed; box-shadow: none; }
    #error-msg { color: #ff6eb4; font-size: 0.9rem; min-height: 1.2em; }

    /* Game Screen */
    #game-screen {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #game-canvas {
      display: block;
      background: #111a0d;
    }

    /* Chat Window */
    #chat-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 300px;
      background: rgba(8, 14, 5, 0.88);
      border: 1px solid #cc0060;
      border-radius: 4px;
      overflow: hidden;
    }
    #chat-messages {
      height: 150px;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .chat-msg {
      font-size: 0.8rem;
      line-height: 1.3;
    }
    .chat-msg .sender { color: #ff6eb4; font-weight: bold; }
    .chat-msg .text { color: #c8d0b8; }
    #chat-input-row {
      display: flex;
      border-top: 1px solid #cc0060;
    }
    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #ece8d0;
      padding: 8px;
      font-size: 0.85rem;
      font-family: 'Courier New', monospace;
      outline: none;
    }
    #chat-send {
      background: #cc0060;
      border: none;
      color: #ece8d0;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'Courier New', monospace;
    }
    #chat-send:hover { background: #ff2277; }

    /* Player count */
    #hud {
      position: absolute;
      top: 15px;
      right: 20px;
      background: rgba(8, 14, 5, 0.82);
      border: 1px solid #cc0060;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 0.85rem;
      color: #ff6eb4;
    }

    /* Controls hint */
    #controls-hint {
      position: absolute;
      top: 15px;
      left: 20px;
      background: rgba(8, 14, 5, 0.82);
      border: 1px solid #cc0060;
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 0.78rem;
      color: #7fff7a;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="login-screen">
    <h1>LIVING DEAD BEAT</h1>
    <p>Enter a nickname to join the game</p>
    <input id="nickname-input" type="text" placeholder="Your nickname..." maxlength="20" autocomplete="off" />
    <button id="join-btn">Enter the Graveyard</button>
    <div id="error-msg"></div>
  </div>

  <div id="game-screen">
    <canvas id="game-canvas"></canvas>
    <div id="hud">Players: <span id="player-count">0</span>/10</div>
    <div id="controls-hint">
      WASD / Arrow Keys — Move<br>
      Z — Attack<br>
      X — Dodge
    </div>
    <div id="chat-container">
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Say something..." maxlength="200" autocomplete="off" />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
