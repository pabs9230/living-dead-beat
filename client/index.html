<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Living Dead Beat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #e0e0e0;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Login Screen */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    #login-screen h1 {
      font-size: 3rem;
      color: #a78bfa;
      text-shadow: 0 0 20px #7c3aed;
      letter-spacing: 4px;
    }
    #login-screen p {
      color: #6b7280;
      font-size: 0.9rem;
    }
    #nickname-input {
      background: #1a1a2e;
      border: 2px solid #4c1d95;
      color: #e0e0e0;
      padding: 12px 20px;
      font-size: 1.1rem;
      border-radius: 8px;
      outline: none;
      width: 280px;
      text-align: center;
    }
    #nickname-input:focus { border-color: #7c3aed; }
    #join-btn {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 12px 40px;
      font-size: 1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    #join-btn:hover { background: #6d28d9; }
    #join-btn:disabled { background: #4c1d95; cursor: not-allowed; }
    #error-msg { color: #f87171; font-size: 0.9rem; min-height: 1.2em; }

    /* Game Screen */
    #game-screen {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    #game-canvas {
      display: block;
      background: #0d0d1f;
    }

    /* Chat Window */
    #chat-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 300px;
      background: rgba(10, 10, 26, 0.85);
      border: 1px solid #4c1d95;
      border-radius: 8px;
      overflow: hidden;
    }
    #chat-messages {
      height: 150px;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .chat-msg {
      font-size: 0.8rem;
      line-height: 1.3;
    }
    .chat-msg .sender { color: #a78bfa; font-weight: bold; }
    .chat-msg .text { color: #d1d5db; }
    #chat-input-row {
      display: flex;
      border-top: 1px solid #4c1d95;
    }
    #chat-input {
      flex: 1;
      background: transparent;
      border: none;
      color: #e0e0e0;
      padding: 8px;
      font-size: 0.85rem;
      outline: none;
    }
    #chat-send {
      background: #7c3aed;
      border: none;
      color: white;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    #chat-send:hover { background: #6d28d9; }

    /* Player count */
    #hud {
      position: absolute;
      top: 15px;
      right: 20px;
      background: rgba(10, 10, 26, 0.75);
      border: 1px solid #4c1d95;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.85rem;
      color: #a78bfa;
    }

    /* Controls hint */
    #controls-hint {
      position: absolute;
      top: 15px;
      left: 20px;
      background: rgba(10, 10, 26, 0.75);
      border: 1px solid #4c1d95;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.78rem;
      color: #6b7280;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="login-screen">
    <h1>LIVING DEAD BEAT</h1>
    <p>Enter a nickname to join the game</p>
    <input id="nickname-input" type="text" placeholder="Your nickname..." maxlength="20" autocomplete="off" />
    <button id="join-btn">Enter the Night</button>
    <div id="error-msg"></div>
  </div>

  <div id="game-screen">
    <canvas id="game-canvas"></canvas>
    <div id="hud">Players: <span id="player-count">0</span>/10</div>
    <div id="controls-hint">
      WASD / Arrow Keys — Move<br>
      Z — Attack<br>
      X — Dodge
    </div>
    <div id="chat-container">
      <div id="chat-messages"></div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Say something..." maxlength="200" autocomplete="off" />
        <button id="chat-send">Send</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
